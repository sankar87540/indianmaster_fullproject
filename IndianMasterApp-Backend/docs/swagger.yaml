basePath: /api/v1
definitions:
  dto.APIResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta:
        description: Pagination metadata or other metadata
      success:
        type: boolean
    type: object
  dto.AdminStatsRequest:
    properties:
      endDate:
        type: string
      startDate:
        type: string
    type: object
  dto.ApproveVerificationRequest:
    properties:
      entityId:
        type: string
      entityType:
        enum:
        - WORKER
        - HIRER
        - BUSINESS
        type: string
    required:
    - entityId
    - entityType
    type: object
  dto.AuditLogRequest:
    properties:
      actionType:
        type: string
      endDate:
        type: string
      limit:
        type: integer
      page:
        type: integer
      startDate:
        type: string
      userId:
        type: string
    type: object
  dto.BusinessVerificationRequest:
    properties:
      action:
        description: approve, reject
        type: string
      businessId:
        type: string
      reason:
        type: string
    type: object
  dto.CreateApplicationRequest:
    properties:
      jobId:
        type: string
    required:
    - jobId
    type: object
  dto.CreateChatThreadRequest:
    properties:
      hirerId:
        type: string
      jobId:
        type: string
      workerId:
        type: string
    required:
    - hirerId
    - jobId
    - workerId
    type: object
  dto.CreateJobRequest:
    properties:
      addressText:
        maxLength: 1000
        type: string
      benefits:
        items:
          type: string
        type: array
      businessId:
        type: string
      categories:
        items:
          type: string
        type: array
      city:
        maxLength: 100
        type: string
      experienceMax:
        minimum: 0
        type: integer
      experienceMin:
        minimum: 0
        type: integer
      jobRole:
        maxLength: 100
        type: string
      position:
        maxLength: 200
        type: string
      preferredLanguages:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      salaryMaxAmount:
        minimum: 0
        type: number
      salaryMinAmount:
        minimum: 0
        type: number
      state:
        maxLength: 100
        type: string
      vacancies:
        minimum: 1
        type: integer
      weeklyLeaves:
        maximum: 7
        minimum: 0
        type: integer
      workType:
        maxLength: 50
        type: string
      workingHours:
        maximum: 24
        minimum: 0
        type: integer
    required:
    - businessId
    - city
    - jobRole
    - state
    - vacancies
    type: object
  dto.CreateSubscriptionRequest:
    properties:
      amount:
        minimum: 0
        type: number
      planName:
        enum:
        - Free
        - Premium
        - Enterprise
        type: string
    required:
    - amount
    - planName
    type: object
  dto.CreateWorkerProfileRequest:
    properties:
      availability:
        items:
          type: string
        type: array
      availabilityStatus:
        type: string
      businessTypes:
        items:
          type: string
        type: array
      expectedSalaryMax:
        minimum: 0
        type: integer
      expectedSalaryMin:
        minimum: 0
        type: integer
      experienceYears:
        maximum: 80
        minimum: 0
        type: integer
      jobCategories:
        items:
          type: string
        type: array
      jobRoles:
        items:
          type: string
        type: array
      language:
        enum:
        - en
        - hi
        - ta
        type: string
      languagesKnown:
        items:
          type: string
        type: array
      profilePhotoUrl:
        type: string
      selectedRoles:
        items:
          type: string
        type: array
      venuePreferences:
        items:
          type: string
        type: array
      workTypes:
        items:
          type: string
        type: array
    required:
    - selectedRoles
    type: object
  dto.JobSearchRequest:
    properties:
      benefits:
        type: string
      businessType:
        type: string
      city:
        type: string
      experienceMax:
        type: integer
      experienceMin:
        type: integer
      jobRole:
        type: string
      language:
        type: string
      salaryMax:
        type: number
      salaryMin:
        type: number
      workType:
        type: string
    type: object
  dto.RejectVerificationRequest:
    properties:
      entityId:
        type: string
      entityType:
        enum:
        - WORKER
        - HIRER
        - BUSINESS
        type: string
      reason:
        maxLength: 1000
        type: string
    required:
    - entityId
    - entityType
    - reason
    type: object
  dto.SendChatMessageRequest:
    properties:
      attachmentUrls:
        items:
          type: string
        type: array
      messageText:
        maxLength: 5000
        type: string
      threadId:
        type: string
    required:
    - messageText
    - threadId
    type: object
  dto.SendOTPRequest:
    properties:
      phone:
        maxLength: 20
        minLength: 7
        type: string
    required:
    - phone
    type: object
  dto.UpdateApplicationStatusRequest:
    properties:
      status:
        enum:
        - shortlisted
        - rejected
        - accepted
        - withdrawn
        type: string
    required:
    - status
    type: object
  dto.UpdateJobRequest:
    properties:
      addressText:
        maxLength: 1000
        type: string
      benefits:
        items:
          type: string
        type: array
      categories:
        items:
          type: string
        type: array
      city:
        maxLength: 100
        type: string
      experienceMax:
        minimum: 0
        type: integer
      experienceMin:
        minimum: 0
        type: integer
      position:
        maxLength: 200
        type: string
      preferredLanguages:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      salaryMaxAmount:
        minimum: 0
        type: number
      salaryMinAmount:
        minimum: 0
        type: number
      state:
        maxLength: 100
        type: string
      status:
        enum:
        - DRAFT
        - OPEN
        - PAUSED
        - CLOSED
        - FILLED
        type: string
      vacancies:
        minimum: 1
        type: integer
      weeklyLeaves:
        maximum: 7
        minimum: 0
        type: integer
      workType:
        maxLength: 50
        type: string
      workingHours:
        maximum: 24
        minimum: 0
        type: integer
    type: object
  dto.UpdateWorkerProfileRequest:
    properties:
      availability:
        items:
          type: string
        type: array
      availabilityStatus:
        type: string
      businessTypes:
        items:
          type: string
        type: array
      expectedSalaryMax:
        minimum: 0
        type: integer
      expectedSalaryMin:
        minimum: 0
        type: integer
      experienceYears:
        maximum: 80
        minimum: 0
        type: integer
      jobCategories:
        items:
          type: string
        type: array
      jobRoles:
        items:
          type: string
        type: array
      language:
        enum:
        - en
        - hi
        - ta
        type: string
      languagesKnown:
        items:
          type: string
        type: array
      profilePhotoUrl:
        type: string
      selectedRoles:
        items:
          type: string
        type: array
      venuePreferences:
        items:
          type: string
        type: array
      workTypes:
        items:
          type: string
        type: array
    type: object
  dto.UserActivityRequest:
    properties:
      endDate:
        type: string
      limit:
        type: integer
      page:
        type: integer
      startDate:
        type: string
      userId:
        type: string
    type: object
  dto.VerifyOTPRequest:
    properties:
      language:
        enum:
        - en
        - hi
        - ta
        type: string
      otp:
        type: string
      phone:
        maxLength: 20
        minLength: 7
        type: string
      requestId:
        type: string
      role:
        enum:
        - WORKER
        - HIRER
        - ADMIN
        type: string
    required:
    - otp
    - phone
    - requestId
    - role
    type: object
  dto.WorkerSearchRequest:
    properties:
      availability:
        type: string
      city:
        type: string
      experienceMax:
        type: integer
      experienceMin:
        type: integer
      language:
        type: string
      role:
        type: string
      salaryMax:
        type: integer
      salaryMin:
        type: integer
      venuePreference:
        type: string
      workType:
        type: string
    type: object
  dto.WorkerVerificationRequest:
    properties:
      action:
        description: approve, reject
        type: string
      reason:
        type: string
      workerId:
        type: string
    type: object
info:
  contact:
    email: support@indianmaster.com
    name: API Support
  description: Backend APIs for Indian Master Application - A comprehensive platform
    for job seekers and hirers in India
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Indian Master API
  version: "1.0"
paths:
  /admin/applications/{application_id}/status:
    put:
      consumes:
      - application/json
      description: Update the status of a job application. Notifies the worker of
        the status change.
      parameters:
      - description: Application ID
        in: path
        name: application_id
        required: true
        type: string
      - description: New status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateApplicationStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Application status updated successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to update application status
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Update Application Status
      tags:
      - Application
  /admin/audit-logs:
    get:
      consumes:
      - application/json
      description: Retrieve paginated audit logs with optional filters
      parameters:
      - description: Audit log filters
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.AuditLogRequest'
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Audit logs retrieved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to retrieve audit logs
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get Audit Logs
      tags:
      - Admin
  /admin/business-verification/approve:
    post:
      consumes:
      - application/json
      description: Approve a business verification request
      parameters:
      - description: Business verification approval details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BusinessVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Business verification approved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to approve business verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Approve Business Verification
      tags:
      - Admin
  /admin/business-verification/reject:
    post:
      consumes:
      - application/json
      description: Reject a business verification request
      parameters:
      - description: Business verification rejection details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BusinessVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Business verification rejected successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to reject business verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Reject Business Verification
      tags:
      - Admin
  /admin/stats:
    post:
      consumes:
      - application/json
      description: Retrieve comprehensive admin dashboard statistics
      parameters:
      - description: Date range filters
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.AdminStatsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Admin statistics retrieved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to retrieve admin statistics
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get Admin Statistics
      tags:
      - Admin
  /admin/system-health:
    get:
      consumes:
      - application/json
      description: Retrieve system health status
      produces:
      - application/json
      responses:
        "200":
          description: System health retrieved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to retrieve system health
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get System Health
      tags:
      - Admin
  /admin/user-activities:
    get:
      consumes:
      - application/json
      description: Retrieve paginated user activities with optional filters
      parameters:
      - description: User activity filters
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.UserActivityRequest'
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User activities retrieved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to retrieve user activities
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Get User Activities
      tags:
      - Admin
  /admin/verification/approve:
    post:
      consumes:
      - application/json
      description: Approve a pending verification request. Notifies the worker/business
        owner.
      parameters:
      - description: Verification approval details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ApproveVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification approved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "403":
          description: Forbidden - Admin role required
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to approve verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Approve Verification
      tags:
      - Admin
  /admin/verification/reject:
    post:
      consumes:
      - application/json
      description: Reject a pending verification request. Notifies the worker/business
        owner with the reason.
      parameters:
      - description: Verification rejection details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RejectVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification rejected successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "403":
          description: Forbidden - Admin role required
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to reject verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Reject Verification
      tags:
      - Admin
  /admin/worker-verification/approve:
    post:
      consumes:
      - application/json
      description: Approve a worker verification request
      parameters:
      - description: Worker verification approval details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.WorkerVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Worker verification approved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to approve worker verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Approve Worker Verification
      tags:
      - Admin
  /admin/worker-verification/reject:
    post:
      consumes:
      - application/json
      description: Reject a worker verification request
      parameters:
      - description: Worker verification rejection details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.WorkerVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Worker verification rejected successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to reject worker verification
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Reject Worker Verification
      tags:
      - Admin
  /applications:
    post:
      consumes:
      - application/json
      description: Submit a job application. Notifies the hirer and invalidates recommendation
        cache.
      parameters:
      - description: Application details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Application submitted successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "409":
          description: Already applied to this job
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to apply for job
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Apply to Job
      tags:
      - Application
  /applications/my-applications:
    get:
      consumes:
      - application/json
      description: Retrieve all applications submitted by the authenticated worker
        with pagination
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Applications retrieved successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to fetch applications
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - BearerAuth: []
      summary: Get My Applications
      tags:
      - Application
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Initiate the login/signup flow by sending a 6-digit OTP to the
        provided mobile number.
      parameters:
      - description: Mobile number
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent successfully
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Send OTP to Mobile Number
      tags:
      - Authentication
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Verify the 6-digit OTP. If the user doesn't exist, a new account
        will be created with the provided role and language.
      parameters:
      - description: OTP verification details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authentication successful
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request body or OTP
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Verify OTP and Login/Signup
      tags:
      - Authentication
  /businesses:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of businesses filtered by business type
      parameters:
      - description: Business type to filter by
        in: query
        name: type
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      - default: created_at
        description: Sort field (e.g., created_at, business_name)
        in: query
        name: sort
        type: string
      - default: desc
        description: Sort order (asc or desc)
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Businesses retrieved successfully with pagination metadata
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to fetch businesses
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: List Businesses by Type
      tags:
      - Business
  /businesses/active:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of all active businesses
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: limit
        type: integer
      - default: created_at
        description: Sort field (e.g., created_at, business_name)
        in: query
        name: sort
        type: string
      - default: desc
        description: Sort order (asc or desc)
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Active businesses retrieved successfully with pagination metadata
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Failed to fetch active businesses
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: List Active Businesses
      tags:
      - Business
  /businesses/owner/{owner_id}:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of businesses owned by a specific user
      parameters:
      - description: Owner ID
        in: path
        name: owner_id
        required: true
